<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustelid Sorter 2000</title>
    <link rel="stylesheet" href="/Crema/crema.css">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        :root {
            --crema-bg: #0f0a0a;
            --crema-fg: #e0c3a0;
        }

        .login-container,
        .category-container,
        .sort-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px; /* Added side padding for mobile */
        }

        .active {
            display: flex;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .category-card {
            background: var(--crema-surface);
            border: 2px solid var(--crema-fg);
            border-radius: var(--crema-radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s var(--crema-ease);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-card:hover:not(.completed) {
            transform: translateY(-5px);
            background: var(--crema-surface-hover);
        }

        .category-card.completed {
            opacity: 0.4;
            cursor: default;
            border-style: dashed;
        }

        .category-card.completed::after {
            content: "You've Completed This";
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--crema-success);
        }

        .category-card.globally-completed {
            opacity: 0.4;
            cursor: default;
            border-style: solid;
            background: rgba(0, 0, 0, 0.1);
        }

        .category-card.globally-completed::after {
            content: "Locked: Ranking Complete";
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--crema-fg);
            opacity: 0.8;
        }

        .category-card[data-cat="size"].globally-completed::after {
            content: "Ranked by Average Weight";
            color: var(--crema-success);
        }

        .crema-header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
        }

        body.is-sorting .crema-header {
            display: none !important;
        }

        .comparison-pair {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
            flex: 1;
            min-height: 0;
        }

        .cache-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: var(--crema-surface);
            border: 1px solid var(--crema-fg);
            padding: 5px 15px;
            border-radius: var(--crema-radius-pill);
            font-size: 0.8rem;
            opacity: 0.8;
            display: none;
            z-index: 1000;
        }

        .cache-status.active {
            display: block;
        }

        .connection-status {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--crema-error);
            color: white;
            padding: 5px 20px;
            border-radius: var(--crema-radius-pill);
            font-size: 0.9rem;
            font-weight: bold;
            display: none;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .connection-status.active {
            display: block;
            animation: crema-pulse 2s infinite;
        }

        @keyframes crema-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .crema-header {
                flex-direction: column;
                padding-top: 40px;
            }
            .header-actions {
                position: static;
                margin-top: 15px;
            }
            .header-user {
                top: 10px;
                left: 50% !important;
                transform: translateX(-50%);
                width: 100%;
                text-align: center;
            }
            .sort-controls {
                flex-direction: column;
                width: 100%;
                gap: 10px;
            }
            .sort-controls .crema-btn {
                width: 100%;
            }

            .comparison-pair {
                flex-direction: column;
                gap: 10px;
                margin-top: 10px;
            }
            .crema-page {
                padding: var(--crema-space-md);
            }
            .mustelid-card {
                padding: 12px;
                gap: 10px;
            }
            .mustelid-card h3 {
                font-size: 1.1rem;
            }
            .question-text {
                font-size: 1.4rem;
                margin-bottom: 10px;
            }
        }

        .mustelid-card {
            flex: 1;
            max-width: 500px;
            background: var(--crema-surface);
            border: 3px solid var(--crema-fg);
            border-radius: var(--crema-radius-xl);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s var(--crema-ease);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            min-height: 0;
            /* Important for flex-shrink */
        }

        .mustelid-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--crema-focus-ring);
            background: var(--crema-surface-hover);
        }

        .mustelid-card:active {
            transform: scale(0.98);
        }

        .mustelid-card img {
            width: 100%;
            max-height: 40vh;
            /* Prevent scrolling on desktop/mobile */
            aspect-ratio: 1;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: var(--crema-radius-md);
            border: 2px solid var(--crema-fg);
        }

        .crema-btn {
            user-select: none;
            -webkit-user-select: none;
            min-width: 160px;
        }

        .mustelid-card h3 {
            font-size: 1.5rem;
            text-align: center;
        }

        .mustelid-info {
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.9;
            color: var(--crema-fg);
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: var(--crema-radius-md);
            width: 100%;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 8px;
            background: var(--crema-surface);
            border-radius: 4px;
            margin-top: 40px;
            overflow: hidden;
            border: 1px solid var(--crema-border-subtle);
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--crema-fg);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
        }

        .header-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .header-user {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1rem;
            opacity: 0.6;
        }

        .sort-controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            width: 100%;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="crema-page">
        <header class="crema-header">
            <h1>Mustelid Sorter 2000</h1>
            <div id="username-display" class="header-user"></div>
            <div class="header-actions">
                <button id="settings-btn" class="crema-btn crema-btn-sm">Settings</button>
            </div>
        </header>

        <!-- Login Screen -->
        <div id="login-screen" class="login-container active">
            <div class="crema-card">
                <h2 class="crema-card-title">Welcome</h2>
                <div class="crema-field">
                    <label class="crema-field-label">Your Name, please.</label>
                    <input type="text" id="username-input" class="crema-input" placeholder="e.g. UmaStan69">
                </div>
                <button id="login-btn" class="crema-btn crema-btn-lg" style="width: 100%">Enter</button>
            </div>
        </div>

        <!-- Category Selection Screen -->
        <div id="category-screen" class="category-container">
            <h2 class="question-text">Select a Category</h2>
            <div class="category-grid">
                <div class="category-card" data-cat="noodle" data-label="Noodle vs Dog">
                    <h3>Noodliness</h3>
                </div>
                <div class="category-card" data-cat="size" data-label="Little vs Big">
                    <h3>Size</h3>
                </div>
                <div class="category-card" data-cat="biome" data-label="Arid vs Aquatic">
                    <h3>Habitat</h3>
                </div>
                <div class="category-card" data-cat="sillay" data-label="Sillay vs Serious">
                    <h3>Sillay</h3>
                </div>
                <div class="category-card" data-cat="snoot" data-label="Stubby vs Long Snoot">
                    <h3>Snoot</h3>
                </div>
            </div>
            <div class="sort-controls">
                <button id="logout-btn" class="crema-btn crema-btn-ghost">Switch User</button>
                <button id="report-btn" class="crema-btn crema-btn-ghost">Report Problem</button>
                <button id="reset-btn" class="crema-btn crema-btn-danger">Reset All Progress</button>
            </div>
        </div>

        <!-- Sort Screen -->
        <div id="sort-screen" class="sort-container">
            <h2 id="sort-question" class="question-text">Which is more noodly?</h2>
            <div class="comparison-pair">
                <div id="left-card" class="mustelid-card">
                    <img id="left-img" src="" alt="">
                    <h3 id="left-name"></h3>
                    <div id="left-info" class="mustelid-info"></div>
                </div>
                <div id="right-card" class="mustelid-card">
                    <img id="right-img" src="" alt="">
                    <h3 id="right-name"></h3>
                    <div id="right-info" class="mustelid-info"></div>
                </div>
            </div>
            <div class="progress-bar-wrap">
                <div id="sort-progress" class="progress-bar-fill"></div>
            </div>
            <div class="sort-controls">
                <button id="back-btn" class="crema-btn crema-btn-ghost" disabled>Back</button>
                <button id="exit-sort" class="crema-btn crema-btn-ghost">Save & Exit</button>
            </div>
        </div>
        <div id="cache-status" class="cache-status">Caching Mustelids...</div>
        <div id="connection-status" class="connection-status">Reconnecting...</div>
    </div>

    <script src="/Crema/crema.js"></script>
    <script>
        const state = {
            username: '',
            completed: [],
            mustelids: [],
            userStates: {},
            currentCategory: null,
            currentSortState: null,
            history: null,
            imgCache: {},
            isOffline: false,
            retryQueue: []
        };

        // --- Robust Networking ---
        async function robustFetch(url, options = {}, retries = 5) {
            const statusEl = document.getElementById('connection-status');
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (state.isOffline) {
                        state.isOffline = false;
                        statusEl.classList.remove('active');
                        console.log("Server reconnected.");
                    }
                    return res;
                } catch (err) {
                    state.isOffline = true;
                    statusEl.classList.add('active');
                    const delay = Math.min(1000 * Math.pow(2, i), 10000);
                    console.warn(`Fetch failed. Retrying in ${delay}ms...`, url);
                    await new Promise(r => setTimeout(r, delay));
                }
            }
            throw new Error(`Failed to fetch ${url} after ${retries} attempts.`);
        }

        // --- Pre-warming & Caching ---
        async function fetchImage(m) {
            if (state.imgCache[m.id]) return state.imgCache[m.id];
            
            const cached = localStorage.getItem(`mustelid-img-${m.id}`);
            if (cached) {
                state.imgCache[m.id] = cached;
                return cached;
            }

            try {
                const response = await fetch(m.image);
                const blob = await response.blob();
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64data = reader.result;
                        state.imgCache[m.id] = base64data;
                        try { localStorage.setItem(`mustelid-img-${m.id}`, base64data); } catch(e) {}
                        resolve(base64data);
                    };
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                console.error("Fetch failed for", m.id, err);
                return null;
            }
        }

        async function prewarmImages() {
            const statusEl = document.getElementById('cache-status');
            statusEl.classList.add('active');
            let count = 0;
            for (const m of state.mustelids) {
                await fetchImage(m);
                count++;
                statusEl.textContent = `Caching Mustelids: ${count}/${state.mustelids.length}`;
            }
            statusEl.textContent = "Cache Ready";
            setTimeout(() => statusEl.classList.remove('active'), 2000);
        }

        async function prewarmNext() {
            const s = state.currentSortState;
            if (s.isDone) return;

            // Prewarm all active tasks and their potential next mids
            s.activeTasks.forEach(task => {
                fetchImage(task.item);
                const mid = Math.floor((task.low + task.high) / 2);
                if (s.sortedList[mid]) fetchImage(s.sortedList[mid]);
                
                // Peek ahead
                const midL = Math.floor((mid + 1 + task.high) / 2);
                if (s.sortedList[midL]) fetchImage(s.sortedList[midL]);
                const midR = Math.floor((task.low + mid - 1) / 2);
                if (s.sortedList[midR]) fetchImage(s.sortedList[midR]);
            });
            
            if (s.remaining.length > 0) fetchImage(s.remaining[0]);
        }

        const screens = {
            login: document.getElementById('login-screen'),
            category: document.getElementById('category-screen'),
            sort: document.getElementById('sort-screen')
        };

        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
            
            // Toggle header visibility for "Main Screen" (Login)
            if (name === 'login') {
                document.body.classList.remove('is-sorting');
            } else {
                document.body.classList.add('is-sorting');
            }
        }

        // --- Settings ---
        const settings = Crema.renderSettingsModal({
            trigger: document.getElementById('settings-btn')
        });

        // --- Auth ---
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('username-input').value.trim();
            if (!username) return;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await res.json();

            state.username = data.username;
            state.completed = data.completed;
            state.globalCompleted = data.global_completed || [];
            state.userStates = data.states;
            document.getElementById('username-display').textContent = `User: ${state.username}`;
            
            updateCategoryUI();
            showScreen('category');
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            state.username = '';
            showScreen('login');
        });

        async function loadMustelids() {
            const res = await fetch('/api/mustelids');
            state.mustelids = await res.json();
        }

        function updateCategoryUI() {
            document.querySelectorAll('.category-card').forEach(card => {
                const cat = card.dataset.cat;
                card.classList.remove('completed', 'globally-completed');
                
                if (state.globalCompleted.includes(cat)) {
                    card.classList.add('globally-completed');
                } else if (state.completed.includes(cat)) {
                    card.classList.add('completed');
                }
            });
        }

        // --- Sorting Engine (Interleaved Multi-tasking Binary Insertion Sort) ---
        function initSort(cat) {
            if (state.userStates[cat]) {
                state.currentSortState = state.userStates[cat];
                // Migration check
                if (!state.currentSortState.activeTasks) {
                    state.currentSortState.activeTasks = [{
                        item: state.currentSortState.currentItem,
                        low: state.currentSortState.low,
                        high: state.currentSortState.high
                    }];
                    state.currentSortState.lastViewedIds = [];
                }
            } else {
                const shuffled = [...state.mustelids].sort(() => Math.random() - 0.5);
                state.currentSortState = {
                    sortedList: [shuffled[0]],
                    remaining: shuffled.slice(1),
                    activeTasks: [],
                    isDone: false,
                    totalPicks: 0,
                    lastViewedIds: []
                };
                fillTasks();
            }
            state.history = null;
            document.getElementById('back-btn').disabled = true;
            nextStep();
        }

        function fillTasks() {
            const s = state.currentSortState;
            // Interleave up to 4 parallel insertions for variety
            while (s.activeTasks.length < 4 && s.remaining.length > 0) {
                const nextItem = s.remaining.shift();
                s.activeTasks.push({
                    item: nextItem,
                    low: 0,
                    high: s.sortedList.length - 1
                });
            }
        }

        function nextStep() {
            const s = state.currentSortState;
            if (s.isDone) {
                finishCategory();
                return;
            }

            // Find a task that doesn't involve the last viewed mustelids
            let taskIndex = s.activeTasks.findIndex(t => {
                const mid = Math.floor((t.low + t.high) / 2);
                const compItem = s.sortedList[mid];
                return !s.lastViewedIds.includes(t.item.id) && !s.lastViewedIds.includes(compItem.id);
            });

            if (taskIndex === -1) taskIndex = 0;
            s.currentTaskIndex = taskIndex;
            
            renderStep();
        }

        function renderStep() {
            const s = state.currentSortState;
            const task = s.activeTasks[s.currentTaskIndex];
            const mid = Math.floor((task.low + task.high) / 2);
            const compItem = s.sortedList[mid];

            updateSortUI(task.item, compItem);
            s.lastViewedIds = [task.item.id, compItem.id];
            prewarmNext(); 
        }

        function updateSortUI(current, comparison) {
            // Look up latest data from master list to ensure new facts (weight, etc) are picked up
            const left = state.mustelids.find(m => m.id === current.id) || current;
            const right = state.mustelids.find(m => m.id === comparison.id) || comparison;

            document.getElementById('left-name').textContent = left.name;
            document.getElementById('left-img').src = state.imgCache[left.id] || left.image;
            document.getElementById('right-name').textContent = right.name;
            document.getElementById('right-img').src = state.imgCache[right.id] || right.image;
            
            // Display category-specific info
            const leftInfo = document.getElementById('left-info');
            const rightInfo = document.getElementById('right-info');
            
            const cat = state.currentCategory;
            if (cat === 'size') {
                leftInfo.textContent = `Weight: ${left.weight || left.weight_kg || 'Unknown'}`;
                rightInfo.textContent = `Weight: ${right.weight || right.weight_kg || 'Unknown'}`;
            } else if (cat === 'biome') {
                leftInfo.textContent = `Habitat: ${left.habitat || 'Varies'}`;
                rightInfo.textContent = `Habitat: ${right.habitat || 'Varies'}`;
            } else if (cat === 'sillay') {
                leftInfo.textContent = `Fun Fact: ${left.fun_fact || 'So sillay!'}`;
                rightInfo.textContent = `Fun Fact: ${right.fun_fact || 'So sillay!'}`;
            } else {
                leftInfo.textContent = left.scientific_name;
                rightInfo.textContent = right.scientific_name;
            }

            // Progress = (items sorted / total items)
            const progress = (state.currentSortState.sortedList.length / state.mustelids.length) * 100;
            document.getElementById('sort-progress').style.width = `${progress}%`;
            document.getElementById('sort-question').textContent = `Which is more ${getAdjective(state.currentCategory)}?`;
        }

        async function handleChoice(choice) {
            state.history = JSON.parse(JSON.stringify(state.currentSortState));
            document.getElementById('back-btn').disabled = false;

            const s = state.currentSortState;
            const task = s.activeTasks[s.currentTaskIndex];
            const mid = Math.floor((task.low + task.high) / 2);
            
            const loser = (choice === 'left') ? s.sortedList[mid] : task.item;
            const winner = (choice === 'left') ? task.item : s.sortedList[mid];

            if (choice === 'left') {
                task.low = mid + 1;
            } else {
                task.high = mid - 1;
            }

            if (task.low > task.high) {
                // Task complete! Insert into sorted list
                s.sortedList.splice(task.low, 0, task.item);
                s.activeTasks.splice(s.currentTaskIndex, 1);
                
                // Resync bounds for other tasks
                s.activeTasks.forEach(t => {
                    t.high = s.sortedList.length - 1;
                });

                if (s.activeTasks.length === 0 && s.remaining.length === 0) {
                    s.isDone = true;
                } else {
                    fillTasks();
                }
            }

            s.totalPicks++;
            await saveProgress({ winner: winner.name, loser: loser.name });
            nextStep();
        }

        async function saveProgress(extra = null) {
            const body = {
                category: state.currentCategory,
                state: state.currentSortState,
                last_pick: extra?.undo ? null : extra
            };
            
            if (extra?.undo) {
                body.undo = true;
            }
            
            try {
                await robustFetch('/api/save_state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            } catch (err) {
                console.error("Critical: Could not save progress even after retries.");
            }
        }

        async function undoLast() {
            if (!state.history) return;
            state.currentSortState = state.history;
            state.history = null;
            document.getElementById('back-btn').disabled = true;
            renderStep(); // Use renderStep instead of nextStep to stay on the restored task
            await saveProgress({ undo: true });
        }

        document.getElementById('reset-btn').addEventListener('click', async () => {
            if (await Crema.showModal({
                title: "Reset Progress?",
                message: "This will permanently delete ALL your rankings and completions. This cannot be undone.",
                confirmText: "Yes, Reset Everything",
                cancelText: "Keep Progress",
                showCancel: true
            })) {
                await fetch('/api/reset_progress', { method: 'POST' });
                state.completed = [];
                state.userStates = {};
                updateCategoryUI();
            }
        });

        document.getElementById('report-btn').addEventListener('click', async () => {
            const message = prompt("What went wrong? (Describe the issue)");
            if (message && message.trim()) {
                await fetch('/api/report_problem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message.trim() })
                });
                alert("Thank you! Your report has been sent to the team.");
            }
        });

        document.getElementById('left-card').addEventListener('click', () => handleChoice('left'));
        document.getElementById('right-card').addEventListener('click', () => handleChoice('right'));
        document.getElementById('back-btn').addEventListener('click', undoLast);
        document.getElementById('exit-sort').addEventListener('click', () => showScreen('category'));

        function getAdjective(cat) {
            switch (cat) {
                case 'noodle': return 'noodly';
                case 'size': return 'big';
                case 'biome': return 'aquatic';
                case 'sillay': return 'sillay';
                case 'snoot': return 'long snooted';
                default: return 'X';
            }
        }

        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                if (card.classList.contains('completed') || card.classList.contains('globally-completed')) return;
                state.currentCategory = card.dataset.cat;
                initSort(state.currentCategory);
                showScreen('sort');
            });
        });

        async function finishCategory() {
            await Crema.showModal({
                title: "Comparisons Completed",
                message: `You've ranked all mustelids for ${getAdjective(state.currentCategory)}. Values will be assigned on a 1-5 scale.`,
                confirmText: "Excellent",
                showCancel: false
            });
            updateCategoryUI();
            showScreen('category');
        }
        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', async () => {
            await loadMustelids();
            prewarmImages();
        });
    </script>
</body>

</html>
